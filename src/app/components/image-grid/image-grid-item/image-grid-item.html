<div class="image-grid-item">
  <!-- WIP: Use `NgOptimizedImage` for images at some point -->
  <img
    class="image"
    [src]="imageUrl()"
    [alt]="imageAlt()"
    [attr.loading]="priorityImage() ? 'eager' : 'lazy'"
    [attr.fetchpriority]="priorityImage() ? 'high' : 'low'"
    decoding="async"
  />
  <div class="description-container">
    <div class="g-title-3">
      <span class="g-truncate-1">
        {{ label() }}
      </span>
    </div>
    <div class="g-text-2 description">
      <ng-content />
    </div>
    <a
      class="g-label-3 link"
      [routerLink]="linkUri()"
      [attr.aria-label]="link.textContent.trim()"
      #link
    >
      More information...
    </a>
  </div>
</div>
